baseURL = 'https://future-tech-lab.com/'
languageCode = 'en-us'
title = 'Future Tech Lab'
defaultContentLanguage = 'en'

# Permalinks (SEO Optimized)
[permalinks]
  posts = '/:slug/'

# Sitemap Configuration
[sitemap]
  changefreq = 'daily'
  priority = 0.8
  filename = 'sitemap.xml'

# RSS Feed
[outputs]
  home = ['HTML', 'RSS']

# Site Parameters (All English)
[params]
  description = "AI Technology, Business Automation, and Software Guides - Future Tech Lab"
  author = "FTL Editor"
  favicon = "/images/favicon.ico"
  copyright = "© 2026 Future Tech Lab. All rights reserved."

# Markdown Rendering (HTML Allowed)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'monokai'

# Taxonomy Configuration
[taxonomies]
  category = 'categories'
  tag = 'tags'

# Automatic robots.txt
enableRobotsTXT = true

# [핵심] 하단 메뉴 설정 (Footer Menu)
[[menu.footer]]
    name = "About Us"
    url = "/about/"
    weight = 1

[[menu.footer]]
    name = "Privacy Policy"
    url = "/privacy/"
    weight = 2

[[menu.footer]]
    name = "Terms of Service"
    url = "/terms/"
    weight = 3

[[menu.footer]]
    name = "Contact Us"
    url = "/contact/"
    weight = 4
