<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <link rel="stylesheet" href="/css/style.css">
    {{ template "_internal/opengraph.html" . }}
    <style>
        /* 💡 글로벌 제국을 위한 추가 스타일링 */
        .footer-nav a:hover { color: #007bff !important; text-decoration: underline !important; }
        .site-nav a { margin-left: 15px; text-decoration: none; color: inherit; font-weight: 500; }
        .site-nav a:hover { color: #007bff; }
    </style>
</head>
<body>
    <header class="site-header" style="border-bottom: 1px solid #eee; padding: 20px 0;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="/" class="site-logo" style="font-size: 1.5rem; font-weight: 800; text-decoration: none; color: #1a1a1a;">
                Future Tech Lab
            </a>
            <nav class="site-nav">
                <a href="/">Home</a>
                <a href="/categories/ai_lab/">AI Lab</a>
                <a href="/categories/biz_forms/">Business</a>
                <a href="/categories/soft_guide/">Software</a>
                <a href="/categories/smart_income/">Income</a>
            </nav>
        </div>
    </header>

    <main style="padding: 40px 0; min-height: 70vh;">
        <div class="container">
            {{ block "main" . }}{{ end }}
        </div>
    </main>

    <footer class="site-footer" style="background-color: #f8f9fa; border-top: 1px solid #eee; padding: 50px 0; text-align: center;">
        <div class="container">
            <nav class="footer-nav" style="margin-bottom: 20px; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap;">
                {{ range .Site.Menus.footer }}
                <a href="{{ .URL | relURL }}" style="color: #6c757d; text-decoration: none; font-size: 0.85rem; font-weight: 500;">
                    {{ .Name }}
                </a>
                {{ end }}
            </nav>

            <div style="color: #adb5bd; font-size: 0.8rem;">
                <p>&copy; 2026 {{ .Site.Title }}. All rights reserved.</p>
                <p style="margin-top: 10px; font-style: italic;">Empowering the future through AI and Automation.</p>
            </div>
        </div>
    </footer>
</body>
</html>
