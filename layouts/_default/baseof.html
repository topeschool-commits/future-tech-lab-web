<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <link rel="stylesheet" href="/css/style.css">
    {{ template "_internal/opengraph.html" . }}
    <style>
        /* 💡 글로벌 제국 가독성 강화 */
        .site-nav a:hover, .footer-nav a:hover { color: #007bff !important; text-decoration: underline !important; }
        .site-nav a { transition: all 0.2s ease; }
    </style>
</head>
<body>
    <header class="site-header" style="background-color: #1a1c2c !important; border-bottom: 2px solid #333; padding: 25px 0; width: 100%;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; padding: 0 20px;">
            
            <a href="/" class="site-logo" style="display: block !important; text-decoration: none !important;">
                <span style="color: #ffffff !important; font-size: 1.6rem !important; font-weight: 800 !important; letter-spacing: -0.05em !important;">
                    Future Tech Lab
                </span>
            </a>

            <nav class="site-nav" style="display: flex; gap: 20px;">
                {{ range .Site.Menus.main }}
                <a href="{{ .URL | relURL }}" style="color: #ffffff !important; text-decoration: none; font-weight: 500; font-size: 0.95rem;">
                    {{ .Name }}
                </a>
                {{ end }}
            </nav>
        </div>
    </header>

    <main style="padding: 40px 0; min-height: 70vh;">
        <div class="container" style="max-width: 1100px; margin: 0 auto; padding: 0 20px;">
            {{ block "main" . }}{{ end }}
        </div>
    </main>

    <footer class="site-footer" style="background-color: #f8f9fa; border-top: 1px solid #eee; padding: 50px 0; text-align: center;">
        <div class="container">
            <nav class="footer-nav" style="margin-bottom: 20px; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap;">
                {{ range .Site.Menus.footer }}
                <a href="{{ .URL | relURL }}" style="color: #6c757d; text-decoration: none; font-size: 0.85rem; font-weight: 500;">
                    {{ .Name }}
                </a>
                {{ end }}
            </nav>

            <div style="color: #adb5bd; font-size: 0.8rem;">
                <p>&copy; 2026 {{ .Site.Title }}. All rights reserved.</p>
                <p style="margin-top: 10px; font-style: italic;">Empowering the future through AI and Automation.</p>
            </div>
        </div>
    </footer>
</body>
</html>
