{{ define "main" }}
<h1 class="category-title">{{ .Title }}</h1>
<ul class="post-list">
{{ range .Pages }}
    <li class="post-item">
        <div class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></div>
        <div class="post-meta">
            {{ .Date.Format "2006.01.02" }}
            {{ range .Params.categories }}
            <span class="category">{{ . }}</span>
            {{ end }}
        </div>
        {{ with .Description }}<div class="post-desc">{{ . }}</div>{{ end }}
    </li>
{{ end }}
</ul>
{{ end }}
