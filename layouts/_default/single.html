{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
        {{ .Date.Format "January 02, 2006" }}
        {{ range .Params.categories }}
        · <a href="/categories/{{ . | urlize }}/" style="color:inherit;">{{ . }}</a>
        {{ end }}
    </div>
    {{ with .Params.image }}
    <img src="{{ . }}" alt="{{ $.Title }}" class="featured-image">
    {{ end }}
    {{ .Content }}
    {{ with .Params.tags }}
    <div class="tag-list">
        {{ range . }}
        <a href="/tags/{{ . | urlize }}/">#{{ . }}</a>
        {{ end }}
    </div>
    {{ end }}
</article>
{{ end }}
